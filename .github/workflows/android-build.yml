name: Android Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Unit tests
      run: ./gradlew test --stacktrace

    # --- Signed release APK (master / same-repo pushes with secrets) ---
    # PR builds from forks cannot use secrets; they only run tests above.
    - name: Decode release keystore
      id: keystore
      if: github.event_name == 'push'
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        set -euo pipefail
        if [ -z "${KEYSTORE_BASE64:-}" ]; then
          echo "::error::KEYSTORE_BASE64 secret is missing. Release APK cannot be signed."
          exit 1
        fi
        echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
        test -s "$RUNNER_TEMP/release.jks"
        echo "KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
        echo "decoded=true" >> "$GITHUB_OUTPUT"

    - name: Assemble signed release APK
      if: github.event_name == 'push'
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        set -euo pipefail
        for v in KEYSTORE_PATH KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
          if [ -z "${!v:-}" ]; then
            echo "::error::Missing $v for release signing"
            exit 1
          fi
        done
        ./gradlew assembleRelease --stacktrace
        test -f app/build/outputs/apk/release/app-release.apk

    - name: Verify APK is release-signed
      if: github.event_name == 'push'
      run: |
        set -euo pipefail
        APK=app/build/outputs/apk/release/app-release.apk
        echo "Verifying $APK"
        # Must not be unsigned / must verify
        jarsigner -verify -strict "$APK"
        # Prefer apksigner when available (v2+)
        AS=""
        if command -v apksigner >/dev/null 2>&1; then
          AS=apksigner
        elif [ -n "${ANDROID_HOME:-}" ]; then
          AS=$(find "$ANDROID_HOME/build-tools" -type f -name apksigner 2>/dev/null | sort -V | tail -1 || true)
        fi
        if [ -n "$AS" ]; then
          "$AS" verify --print-certs "$APK" | tee /tmp/apk-certs.txt
          # Fail if this looks like a debug cert (Android debug is CN=Android Debug)
          if grep -qi "CN=Android Debug" /tmp/apk-certs.txt; then
            echo "::error::APK is still signed with the Android debug key"
            exit 1
          fi
          if ! grep -qi "CN=TextImageCleaner" /tmp/apk-certs.txt; then
            echo "::error::APK certificate CN is not TextImageCleaner — unexpected signer"
            exit 1
          fi
          echo "Release signature OK (CN=TextImageCleaner)"
        else
          echo "apksigner not found; jarsigner -strict passed"
        fi
        # Single clear name for downloaders (version from Gradle)
        VER=$(grep versionName app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
        OUT="TextImageCleaner-${VER}.apk"
        cp "$APK" "$OUT"
        sha256sum "$OUT" | tee "${OUT}.sha256"
        ls -lh "$OUT"
        echo "SIGNED_APK=$OUT" >> "$GITHUB_ENV"

    - name: Upload signed release APK
      if: github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        # One artifact bundle: the signed APK (+ checksum). Not a debug build.
        name: TextImageCleaner-signed-apk
        path: |
          TextImageCleaner-*.apk
          TextImageCleaner-*.apk.sha256
        retention-days: 90
        if-no-files-found: error

    - name: Upload unit test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: unit-test-results
        path: app/build/test-results/test*/**/*
        retention-days: 14
        if-no-files-found: ignore
