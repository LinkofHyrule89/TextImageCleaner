name: Release signed APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  signed-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Missing secret KEYSTORE_BASE64 — configure repo secrets first."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble signed release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Package and verify APK
        run: |
          set -e
          APK=$(ls app/build/outputs/apk/release/*.apk | head -1)
          echo "Built: $APK"
          # jarsigner always available with JDK; apksigner if build-tools present
          jarsigner -verify -certs "$APK" | head -20
          if command -v apksigner >/dev/null 2>&1; then
            apksigner verify --print-certs "$APK"
          elif [ -n "${ANDROID_HOME:-}" ]; then
            AS=$(find "$ANDROID_HOME/build-tools" -name apksigner 2>/dev/null | sort -V | tail -1)
            if [ -n "$AS" ]; then "$AS" verify --print-certs "$APK"; fi
          fi
          cp "$APK" TextImageCleaner-release.apk
          sha256sum TextImageCleaner-release.apk | tee TextImageCleaner-release.apk.sha256
          ls -lh TextImageCleaner-release.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TextImageCleaner-signed-release
          path: |
            TextImageCleaner-release.apk
            TextImageCleaner-release.apk.sha256
          retention-days: 90

      - name: Publish GitHub Release assets (version tags)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              TextImageCleaner-release.apk \
              TextImageCleaner-release.apk.sha256 \
              --clobber
          else
            gh release create "$TAG" \
              TextImageCleaner-release.apk \
              TextImageCleaner-release.apk.sha256 \
              --title "TextImageCleaner ${TAG#v}" \
              --generate-notes
          fi
