name: Release signed APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  signed-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Missing secret KEYSTORE_BASE64 — configure repo secrets first."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble signed release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Verify APK is release-signed
        run: |
          set -euo pipefail
          APK=$(ls app/build/outputs/apk/release/*.apk | head -1)
          echo "Built: $APK"
          jarsigner -verify -strict "$APK"
          AS=""
          if command -v apksigner >/dev/null 2>&1; then
            AS=apksigner
          elif [ -n "${ANDROID_HOME:-}" ]; then
            AS=$(find "$ANDROID_HOME/build-tools" -type f -name apksigner 2>/dev/null | sort -V | tail -1 || true)
          fi
          if [ -n "$AS" ]; then
            "$AS" verify --print-certs "$APK" | tee /tmp/apk-certs.txt
            if grep -qi "CN=Android Debug" /tmp/apk-certs.txt; then
              echo "::error::APK is signed with the Android debug key"
              exit 1
            fi
            if ! grep -qi "CN=TextImageCleaner" /tmp/apk-certs.txt; then
              echo "::error::Unexpected certificate CN (expected TextImageCleaner)"
              exit 1
            fi
          fi
          VER=$(grep versionName app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          OUT="TextImageCleaner-${VER}.apk"
          cp "$APK" "$OUT"
          sha256sum "$OUT" | tee "${OUT}.sha256"
          ls -lh "$OUT"
          echo "SIGNED_APK=$OUT" >> "$GITHUB_ENV"

      - name: Upload signed release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TextImageCleaner-signed-apk
          path: |
            TextImageCleaner-*.apk
            TextImageCleaner-*.apk.sha256
          retention-days: 90
          if-no-files-found: error

      - name: Publish GitHub Release assets (version tags)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#v}"
          OUT="TextImageCleaner-${VER}.apk"
          # Only the release-signed APK (+ checksum) — no debug build
          if gh release view "$TAG" >/dev/null 2>&1; then
            # Drop any legacy dual-named assets if present
            gh release delete-asset "$TAG" TextImageCleaner-release.apk --yes 2>/dev/null || true
            gh release delete-asset "$TAG" TextImageCleaner-release.apk.sha256 --yes 2>/dev/null || true
            gh release upload "$TAG" "$OUT" "${OUT}.sha256" --clobber
          else
            gh release create "$TAG" \
              "$OUT" \
              "${OUT}.sha256" \
              --title "TextImageCleaner ${VER}" \
              --notes-file - <<NOTES
## Screenshots

| Cleaner | Selection |
|---------|-----------|
| ![Cleaner](https://raw.githubusercontent.com/LinkofHyrule89/TextImageCleaner/master/docs/screenshots/01-cleaner-grid.png) | ![Selection](https://raw.githubusercontent.com/LinkofHyrule89/TextImageCleaner/master/docs/screenshots/02-selection.png) |

| Settings | Trash |
|----------|-------|
| ![Settings](https://raw.githubusercontent.com/LinkofHyrule89/TextImageCleaner/master/docs/screenshots/03-settings.png) | ![Trash](https://raw.githubusercontent.com/LinkofHyrule89/TextImageCleaner/master/docs/screenshots/04-trash.png) |

---

## TextImageCleaner ${VER}

**One download:** \`${OUT}\` (release-signed).

\`\`\`bash
adb install -r ${OUT}
\`\`\`

SHA-256: \`$(cut -d' ' -f1 "${OUT}.sha256")\`
NOTES
          fi
